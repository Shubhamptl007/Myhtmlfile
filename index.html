<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        :root {
            --primary: 234 179 8;
        }
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        .logo-font {
            font-family: 'Space Grotesk', sans-serif;
        }
        .task-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .task-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
        .toast {
            animation: toastIn 0.3s ease forwards, toastOut 0.3s 2.7s ease forwards;
        }
        @keyframes toastIn {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes toastOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(120%); opacity: 0; }
        }
        .completed .title {
            text-decoration: line-through;
            color: rgb(163 163 163);
        }
        .modal {
            animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes modalPop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-zinc-100 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <div class="w-72 bg-white dark:bg-zinc-900 border-r border-zinc-200 dark:border-zinc-800 flex flex-col">
            <!-- Logo -->
            <div class="px-6 py-8 border-b border-zinc-200 dark:border-zinc-800 flex items-center gap-3">
                <div class="w-10 h-10 bg-yellow-400 rounded-2xl flex items-center justify-center shadow-inner">
                    <i class="fa-solid fa-list-check text-zinc-900 text-2xl"></i>
                </div>
                <div>
                    <span class="logo-font text-3xl font-semibold tracking-tighter text-yellow-500">TaskMaster</span>
                </div>
            </div>

            <!-- Filters -->
            <div class="px-6 py-6">
                <div class="text-xs font-semibold uppercase tracking-widest text-zinc-500 dark:text-zinc-400 mb-3">Categories</div>
                <div id="category-filters" class="space-y-1">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Quick Stats -->
            <div class="mt-auto px-6 py-6 border-t border-zinc-200 dark:border-zinc-800">
                <div onclick="showAddModal()" 
                     class="flex items-center justify-center gap-3 bg-yellow-400 hover:bg-yellow-500 text-zinc-900 font-semibold py-4 rounded-3xl cursor-pointer transition-all active:scale-95 shadow-lg">
                    <i class="fa-solid fa-plus"></i>
                    <span>New Task</span>
                </div>
            </div>

            <!-- Footer info -->
            <div class="px-6 py-4 text-[10px] text-zinc-400 dark:text-zinc-500 flex items-center justify-between border-t border-zinc-200 dark:border-zinc-800">
                <div>Built with ❤️ in vanilla JS</div>
                <div onclick="toggleTheme()" class="cursor-pointer">
                    <i id="theme-icon" class="fa-solid fa-moon text-lg"></i>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col">
            <!-- Top Bar -->
            <div class="h-16 bg-white dark:bg-zinc-900 border-b border-zinc-200 dark:border-zinc-800 px-8 flex items-center justify-between">
                <div class="flex items-center gap-6 flex-1">
                    <!-- Search -->
                    <div class="relative flex-1 max-w-md">
                        <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-zinc-400"></i>
                        <input id="search-input" 
                               onkeyup="handleSearch(this.value)"
                               type="text" 
                               placeholder="Search tasks by title or description..." 
                               class="w-full bg-zinc-100 dark:bg-zinc-800 border border-transparent focus:border-yellow-400 rounded-3xl py-3 pl-11 pr-4 text-sm outline-none transition-all">
                    </div>

                    <!-- Sort -->
                    <div class="flex items-center gap-2">
                        <span class="text-xs text-zinc-500 dark:text-zinc-400">Sort by</span>
                        <select id="sort-select" onchange="renderTasks()" 
                                class="bg-zinc-100 dark:bg-zinc-800 border border-transparent focus:border-yellow-400 rounded-3xl py-2 px-4 text-sm outline-none">
                            <option value="priority-desc">Priority (High → Low)</option>
                            <option value="priority-asc">Priority (Low → High)</option>
                            <option value="title">Title A-Z</option>
                        </select>
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <div id="task-count" 
                         class="px-5 py-2 bg-zinc-100 dark:bg-zinc-800 text-xs font-mono rounded-3xl text-zinc-500 dark:text-zinc-400">
                    </div>
                    
                    <!-- Theme toggle (extra visible) -->
                    <button onclick="toggleTheme()" 
                            class="w-9 h-9 flex items-center justify-center rounded-2xl hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors">
                        <i id="theme-icon-header" class="fa-solid fa-moon"></i>
                    </button>
                </div>
            </div>

            <!-- Tasks Area -->
            <div class="flex-1 overflow-auto p-8" id="main-content">
                <div class="flex items-center justify-between mb-8">
                    <h2 id="view-title" class="text-3xl font-semibold">All Tasks</h2>
                    <div id="active-filter-badge" 
                         class="hidden items-center gap-2 px-4 py-1 bg-yellow-100 dark:bg-yellow-900 text-yellow-700 dark:text-yellow-300 text-xs font-medium rounded-3xl">
                        <span id="filter-name"></span>
                        <i onclick="clearFilter()" class="fa-solid fa-xmark cursor-pointer"></i>
                    </div>
                </div>

                <!-- Task Grid -->
                <div id="task-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- Populated by JavaScript -->
                </div>

                <!-- Empty State -->
                <div id="empty-state" class="hidden flex-col items-center justify-center h-[400px] text-center">
                    <i class="fa-solid fa-clipboard-list text-7xl text-zinc-300 dark:text-zinc-700 mb-6"></i>
                    <p class="text-xl font-medium text-zinc-400">No tasks yet</p>
                    <p class="text-zinc-400 mt-2">Create your first task to get started</p>
                    <button onclick="showAddModal()" 
                            class="mt-8 px-8 py-3 bg-yellow-400 hover:bg-yellow-500 text-zinc-900 font-semibold rounded-3xl flex items-center gap-2">
                        <i class="fa-solid fa-plus"></i>
                        Add Your First Task
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="task-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="modal bg-white dark:bg-zinc-900 w-full max-w-md mx-4 rounded-3xl shadow-2xl">
            <div class="px-8 pt-8 pb-4">
                <div class="flex justify-between items-center mb-6">
                    <h3 id="modal-title" class="text-2xl font-semibold">New Task</h3>
                    <button onclick="hideModal()" 
                            class="text-zinc-400 hover:text-zinc-600 dark:hover:text-zinc-300">
                        <i class="fa-solid fa-xmark text-2xl"></i>
                    </button>
                </div>

                <form id="task-form" onsubmit="handleFormSubmit(event)">
                    <!-- Title -->
                    <div class="mb-5">
                        <label class="block text-xs font-medium text-zinc-500 dark:text-zinc-400 mb-1">TASK TITLE</label>
                        <input id="task-title" type="text" required
                               class="w-full px-5 py-4 bg-zinc-100 dark:bg-zinc-800 border border-transparent focus:border-yellow-400 rounded-3xl outline-none text-lg"
                               placeholder="Finish project proposal">
                    </div>

                    <!-- Description -->
                    <div class="mb-5">
                        <label class="block text-xs font-medium text-zinc-500 dark:text-zinc-400 mb-1">DESCRIPTION</label>
                        <textarea id="task-desc" rows="3"
                                  class="w-full px-5 py-4 bg-zinc-100 dark:bg-zinc-800 border border-transparent focus:border-yellow-400 rounded-3xl outline-none resize-none"
                                  placeholder="Include the Q3 budget breakdown..."></textarea>
                    </div>

                    <div class="grid grid-cols-2 gap-5">
                        <!-- Priority -->
                        <div>
                            <label class="block text-xs font-medium text-zinc-500 dark:text-zinc-400 mb-1">PRIORITY</label>
                            <select id="task-priority"
                                    class="w-full px-5 py-4 bg-zinc-100 dark:bg-zinc-800 border border-transparent focus:border-yellow-400 rounded-3xl outline-none">
                                <option value="low">Low</option>
                                <option value="medium" selected>Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>

                        <!-- Category -->
                        <div>
                            <label class="block text-xs font-medium text-zinc-500 dark:text-zinc-400 mb-1">CATEGORY</label>
                            <select id="task-category"
                                    class="w-full px-5 py-4 bg-zinc-100 dark:bg-zinc-800 border border-transparent focus:border-yellow-400 rounded-3xl outline-none">
                                <option value="Personal">Personal</option>
                                <option value="Work">Work</option>
                                <option value="Urgent">Urgent</option>
                            </select>
                        </div>
                    </div>

                    <!-- Error message -->
                    <div id="form-error" class="mt-4 text-red-500 text-sm hidden"></div>
                </form>
            </div>

            <div class="px-8 py-6 border-t border-zinc-200 dark:border-zinc-800 flex gap-3">
                <button onclick="hideModal()" 
                        class="flex-1 py-4 text-zinc-500 hover:bg-zinc-100 dark:hover:bg-zinc-800 font-medium rounded-3xl transition-colors">
                    Cancel
                </button>
                <button onclick="document.getElementById('task-form').dispatchEvent(new Event('submit'))"
                        class="flex-1 py-4 bg-yellow-400 hover:bg-yellow-500 text-zinc-900 font-semibold rounded-3xl transition-all active:scale-95">
                    <span id="submit-btn-text">Create Task</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-8 right-8 flex flex-col gap-2 z-50"></div>

    <script>
        // ==================== TASK CLASS ====================
        class Task {
            constructor(title, description, priority, category, completed = false) {
                this.id = Date.now().toString(36) + Math.random().toString(36).substr(2);
                this.title = title;
                this.description = description || "";
                this.priority = priority;
                this.category = category;
                this.completed = completed;
                this.createdAt = new Date().toISOString();
            }
        }

        // ==================== TASK MANAGER CLASS ====================
        class TaskManager {
            constructor() {
                this.tasks = [];
                this.loadFromStorage();
            }

            loadFromStorage() {
                const saved = localStorage.getItem('taskmaster_tasks');
                if (saved) {
                    this.tasks = JSON.parse(saved);
                }
            }

            saveToStorage() {
                localStorage.setItem('taskmaster_tasks', JSON.stringify(this.tasks));
            }

            addTask(task) {
                this.tasks.unshift(task);
                this.saveToStorage();
                if (task.priority === 'high') {
                    showNotification(`🚨 High priority task added: ${task.title}`);
                }
                return task;
            }

            updateTask(id, updatedData) {
                const task = this.tasks.find(t => t.id === id);
                if (!task) return null;
                
                Object.assign(task, updatedData);
                this.saveToStorage();
                
                if (task.priority === 'high') {
                    showNotification(`🔄 High priority task updated: ${task.title}`);
                }
                return task;
            }

            deleteTask(id) {
                this.tasks = this.tasks.filter(t => t.id !== id);
                this.saveToStorage();
            }

            toggleComplete(id) {
                const task = this.tasks.find(t => t.id === id);
                if (!task) return;
                
                task.completed = !task.completed;
                this.saveToStorage();
                
                if (task.completed && task.priority === 'high') {
                    showNotification(`✅ High priority task completed: ${task.title}`);
                }
            }

            getAllTasks() {
                return [...this.tasks];
            }

            getFilteredTasks(category) {
                if (category === 'All' || !category) return this.getAllTasks();
                return this.tasks.filter(t => t.category === category);
            }

            searchTasks(query) {
                if (!query) return this.tasks;
                const q = query.toLowerCase();
                return this.tasks.filter(t => 
                    t.title.toLowerCase().includes(q) || 
                    t.description.toLowerCase().includes(q)
                );
            }
        }

        // ==================== GLOBAL VARIABLES ====================
        let taskManager = new TaskManager();
        let currentFilter = 'All';
        let currentSearchQuery = '';
        let editingTaskId = null;

        // Priority order for sorting
        const priorityOrder = { high: 3, medium: 2, low: 1 };

        // ==================== HELPER FUNCTIONS ====================
        function showNotification(message) {
            const container = document.getElementById('toast-container');
            
            const toast = document.createElement('div');
            toast.className = `toast bg-zinc-900 text-white px-6 py-4 rounded-3xl shadow-2xl flex items-center gap-3 max-w-xs`;
            toast.innerHTML = `
                <i class="fa-solid fa-bell text-yellow-400"></i>
                <span class="text-sm">${message}</span>
            `;
            
            container.appendChild(toast);
            
            // Auto remove after animation
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('taskmaster_theme', isDark ? 'dark' : 'light');
            
            // Update icons
            const icons = document.querySelectorAll('#theme-icon, #theme-icon-header');
            icons.forEach(icon => {
                icon.classList.toggle('fa-moon', !isDark);
                icon.classList.toggle('fa-sun', isDark);
            });
        }

        function loadTheme() {
            const savedTheme = localStorage.getItem('taskmaster_theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
            // Update icons
            const icons = document.querySelectorAll('#theme-icon, #theme-icon-header');
            const isDark = document.documentElement.classList.contains('dark');
            icons.forEach(icon => {
                icon.classList.toggle('fa-moon', !isDark);
                icon.classList.toggle('fa-sun', isDark);
            });
        }

        function renderCategoryFilters() {
            const container = document.getElementById('category-filters');
            const categories = ['All', 'Personal', 'Work', 'Urgent'];
            
            let html = '';
            categories.forEach(cat => {
                const active = cat === currentFilter ? 'bg-yellow-100 dark:bg-yellow-900 text-yellow-700 dark:text-yellow-300 font-semibold' : 'hover:bg-zinc-100 dark:hover:bg-zinc-800';
                html += `
                    <div onclick="setCategoryFilter('${cat}')" 
                         class="px-5 py-3.5 rounded-3xl cursor-pointer flex items-center gap-3 text-sm transition-all ${active}">
                        <i class="fa-solid fa-circle-dot"></i>
                        <span>${cat}</span>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function setCategoryFilter(category) {
            currentFilter = category;
            renderCategoryFilters();
            document.getElementById('view-title').textContent = category === 'All' ? 'All Tasks' : `${category} Tasks`;
            
            const badge = document.getElementById('active-filter-badge');
            if (category === 'All') {
                badge.classList.add('hidden');
            } else {
                badge.classList.remove('hidden');
                document.getElementById('filter-name').textContent = category;
            }
            
            renderTasks();
        }

        function clearFilter() {
            setCategoryFilter('All');
        }

        function handleSearch(query) {
            currentSearchQuery = query;
            renderTasks();
        }

        function getFilteredAndSortedTasks() {
            let filtered = taskManager.getFilteredTasks(currentFilter);
            
            // Apply search
            if (currentSearchQuery) {
                filtered = filtered.filter(t => 
                    t.title.toLowerCase().includes(currentSearchQuery.toLowerCase()) ||
                    t.description.toLowerCase().includes(currentSearchQuery.toLowerCase())
                );
            }
            
            // Apply sort
            const sortValue = document.getElementById('sort-select').value;
            
            filtered.sort((a, b) => {
                if (sortValue === 'priority-desc') {
                    return priorityOrder[b.priority] - priorityOrder[a.priority];
                }
                if (sortValue === 'priority-asc') {
                    return priorityOrder[a.priority] - priorityOrder[b.priority];
                }
                if (sortValue === 'title') {
                    return a.title.localeCompare(b.title);
                }
                return 0;
            });
            
            return filtered;
        }

        function createTaskCard(task) {
            const prioColors = {
                high: 'bg-red-100 text-red-700 dark:bg-red-900 dark:text-red-300',
                medium: 'bg-amber-100 text-amber-700 dark:bg-amber-900 dark:text-amber-300',
                low: 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900 dark:text-emerald-300'
            };
            
            const cardHTML = `
                <div class="task-card bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-3xl overflow-hidden ${task.completed ? 'completed opacity-75' : ''}" data-id="${task.id}">
                    <div class="p-6">
                        <div class="flex items-start justify-between">
                            <div class="flex items-center gap-3">
                                <input type="checkbox" 
                                       ${task.completed ? 'checked' : ''}
                                       onchange="toggleTaskComplete('${task.id}')"
                                       class="w-5 h-5 accent-yellow-400 cursor-pointer">
                                <div>
                                    <div class="title font-semibold text-lg leading-tight">${task.title}</div>
                                    <div class="text-xs text-zinc-400 mt-1">${task.category}</div>
                                </div>
                            </div>
                            
                            <div class="${prioColors[task.priority]} text-[10px] font-medium px-3 py-1 rounded-3xl">
                                ${task.priority.toUpperCase()}
                            </div>
                        </div>
                        
                        ${task.description ? `
                        <p class="mt-5 text-sm text-zinc-600 dark:text-zinc-400 line-clamp-2">
                            ${task.description}
                        </p>` : ''}
                    </div>
                    
                    <div class="bg-zinc-50 dark:bg-zinc-800 px-6 py-4 flex items-center justify-between border-t border-zinc-100 dark:border-zinc-700">
                        <div onclick="editTask('${task.id}')" 
                             class="flex items-center gap-2 text-xs font-medium text-zinc-400 hover:text-yellow-500 cursor-pointer transition-colors">
                            <i class="fa-solid fa-pen"></i>
                            <span>Edit</span>
                        </div>
                        
                        <div onclick="deleteTask('${task.id}')" 
                             class="flex items-center gap-2 text-xs font-medium text-red-400 hover:text-red-600 cursor-pointer transition-colors">
                            <i class="fa-solid fa-trash"></i>
                            <span>Delete</span>
                        </div>
                    </div>
                </div>
            `;
            return cardHTML;
        }

        function renderTasks() {
            const container = document.getElementById('task-list');
            const emptyState = document.getElementById('empty-state');
            const tasks = getFilteredAndSortedTasks();
            
            // Update count
            document.getElementById('task-count').textContent = `${tasks.length} tasks`;
            
            if (tasks.length === 0) {
                container.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            
            let html = '';
            tasks.forEach(task => {
                html += createTaskCard(task);
            });
            
            container.innerHTML = html;
        }

        function toggleTaskComplete(id) {
            taskManager.toggleComplete(id);
            renderTasks();
        }

        function deleteTask(id) {
            if (confirm('Delete this task permanently?')) {
                taskManager.deleteTask(id);
                renderTasks();
            }
        }

        function editTask(id) {
            const task = taskManager.tasks.find(t => t.id === id);
            if (!task) return;
            
            editingTaskId = id;
            
            // Populate form
            document.getElementById('modal-title').textContent = 'Edit Task';
            document.getElementById('submit-btn-text').textContent = 'Save Changes';
            
            document.getElementById('task-title').value = task.title;
            document.getElementById('task-desc').value = task.description;
            document.getElementById('task-priority').value = task.priority;
            document.getElementById('task-category').value = task.category;
            
            document.getElementById('task-modal').classList.remove('hidden');
            document.getElementById('task-modal').classList.add('flex');
        }

        function showAddModal() {
            editingTaskId = null;
            document.getElementById('modal-title').textContent = 'New Task';
            document.getElementById('submit-btn-text').textContent = 'Create Task';
            
            // Clear form
            document.getElementById('task-form').reset();
            document.getElementById('task-priority').value = 'medium';
            
            document.getElementById('task-modal').classList.remove('hidden');
            document.getElementById('task-modal').classList.add('flex');
        }

        function hideModal() {
            const modal = document.getElementById('task-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.getElementById('form-error').classList.add('hidden');
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            
            const title = document.getElementById('task-title').value.trim();
            const description = document.getElementById('task-desc').value.trim();
            const priority = document.getElementById('task-priority').value;
            const category = document.getElementById('task-category').value;
            
            const errorEl = document.getElementById('form-error');
            
            if (!title) {
                errorEl.textContent = '❌ Title is required';
                errorEl.classList.remove('hidden');
                return;
            }
            
            if (editingTaskId) {
                // Update
                taskManager.updateTask(editingTaskId, {
                    title,
                    description,
                    priority,
                    category
                });
            } else {
                // Create new
                const newTask = new Task(title, description, priority, category);
                taskManager.addTask(newTask);
            }
            
            hideModal();
            renderTasks();
            renderCategoryFilters();
        }

        // ==================== INITIALIZATION ====================
        function init() {
            // Tailwind script already loaded via CDN
            
            loadTheme();
            renderCategoryFilters();
            
            // Initial render
            renderTasks();
            
            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.metaKey && e.key === 'k') {
                    e.preventDefault();
                    const searchInput = document.getElementById('search-input');
                    searchInput.focus();
                }
            });
            
            // Close modal on escape
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    const modal = document.getElementById('task-modal');
                    if (!modal.classList.contains('hidden')) {
                        hideModal();
                    }
                }
            });
            
            // Demo data if empty
            if (taskManager.tasks.length === 0) {
                const demoTasks = [
                    new Task("Prepare Q3 presentation", "Include sales figures and roadmap", "high", "Work"),
                    new Task("Buy groceries", "Milk, eggs, bread, and coffee", "medium", "Personal"),
                    new Task("Submit expense report", "Before Friday deadline", "high", "Urgent")
                ];
                demoTasks.forEach(t => taskManager.addTask(t));
                renderTasks();
            }
            
            console.log('%c✅ TaskMaster initialized successfully!', 'color:#eab308; font-weight:600');
        }

        // Start the app
        window.onload = init;
    </script>
</body>
</html>
